name: "CI: Scan Secrets"

# Minimal permissions following security best practices
permissions:
  contents: read

on:
  push:

  pull_request:
    branches:
      - main
      - master
      - releases

  workflow_dispatch:

jobs:
  scan-betterleaks:
    name: Betterleaks Secret Scan
    permissions:
      contents: read
    uses: aglabo/ci-platform/.github/workflows/ru-scan-betterleaks.yml@8d63776a598f98913915e57b74e63ba5d06d5a47 # v0.3.2
