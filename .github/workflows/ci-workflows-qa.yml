name: "CI Workflows QA"

# Minimal permissions following security best practices
permissions:
  contents: read

on:
  push:
    branches:
      - main
      - master
      - releases

  pull_request:
    branches:
      - main
      - master
      - releases

  workflow_dispatch:

jobs:
  actionlint:
    name: Actionlint
    permissions:
      contents: read
    uses: aglabo/ci-platform/.github/workflows/ci-qa-actionlint.yml@cc172e787ece39cb5d9c114f66fae3abce8e5a5a # v0.2.0

  ghalint:
    name: Ghalint
    permissions:
      contents: read
    uses: aglabo/ci-platform/.github/workflows/ci-qa-ghalint.yml@cc172e787ece39cb5d9c114f66fae3abce8e5a5a # v0.2.0
