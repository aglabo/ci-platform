name: "CI: Workflows QA"

# Minimal permissions following security best practices
permissions:
  contents: read

on:
  push:
    branches:
      - main
      - master
      - releases

  pull_request:
    branches:
      - main
      - master
      - releases

  workflow_dispatch:

jobs:
  actionlint:
    name: Actionlint
    permissions:
      contents: read
    uses: aglabo/ci-platform/.github/workflows/ru-qa-actionlint.yml@88dd4b6b3cd448ca31dda101ee890c896f9ae41a # v0.3.2

  ghalint:
    name: Ghalint
    permissions:
      contents: read
    uses: aglabo/ci-platform/.github/workflows/ru-qa-ghalint.yml@88dd4b6b3cd448ca31dda101ee890c896f9ae41a # v0.3.2
