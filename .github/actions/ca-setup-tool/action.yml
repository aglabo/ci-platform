name: "setup-tool"
description: Download, verify, and install a tool from GitHub Releases
inputs:
  repo:
    description: "GitHub repository (owner/repo)"
    required: true
  tool-version:
    description: "Tool version (X.Y.Z format)"
    required: false
    default: "0.0.0"

runs:
  using: composite
  steps:
    - name: Install tool
      shell: bash
      run: bash "${{ github.action_path }}/scripts/setup-tool.sh" "$TOOL_REPO" "$TOOL_VERSION"
      env:
        TOOL_REPO: ${{ inputs.repo }}
        TOOL_VERSION: ${{ inputs.tool-version }}
        RUNNER_TEMP: ${{ runner.temp }}
        RUNNER_ARCH: ${{ runner.arch }}
        GITHUB_ENV: ${{ github.env }}
        GITHUB_PATH: ${{ github.path }}
